{{ define "main" }}

<div class="news-page">
    <div class="container">
        {{ partial "breadcrumb.html" . }}
        <header class="page-header">
            <h1>{{ .Title }}</h1>
        </header>
        <div class="news-list">
            {{ range .Pages }}
            <article class="news-item">
                <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006.01.02" }}</time>
                <div class="news-content">
                    <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
                </div>
            </article>
            {{ end }}
        </div>
    </div>
</div>

{{ end }}
