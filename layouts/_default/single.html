{{ define "main" }}

<article class="single-page">
    <div class="container">
        {{ partial "breadcrumb.html" . }}
        <header class="page-header">
            <h1>{{ .Title }}</h1>
            {{ if .Date }}
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006年01月02日" }}</time>
            {{ end }}
        </header>
        <div class="page-content">
            {{ .Content }}
        </div>
    </div>
</article>

{{ end }}
